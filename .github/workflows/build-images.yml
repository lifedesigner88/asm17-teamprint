name: Build & Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/team-fit-frontend:dev
          build-args: |
            VITE_API_BASE_URL=https://asm17.huposit.kr/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/team-fit-backend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ai-worker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/team-fit-ai-worker:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
