      <stop stop-color="#FFF4E5" />
      <stop offset="0.54" stop-color="#EAFBF2" />
      <stop offset="1" stop-color="#E8F4FF" />
    </linearGradient>
    <linearGradient id="panel" x1="780" y1="180" x2="1120" y2="470" gradientUnits="userSpaceOnUse">
