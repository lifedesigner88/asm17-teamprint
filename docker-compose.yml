name: persona-mirror

services:
  frontend:
    image: node:24.11.0-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && CI=true PERSONA_VITE_CACHE_DIR=/tmp/persona-vite-cache pnpm install --frozen-lockfile=false && PERSONA_VITE_CACHE_DIR=/tmp/persona-vite-cache pnpm --dir apps/frontend dev"
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: python:3.11.15-slim
    working_dir: /workspace
    command: sh -c "pip install uv && uv run --project apps/backend uvicorn main:app --reload --host 0.0.0.0 --port 8000 --app-dir apps/backend"
    env_file:
      - apps/backend/.env
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/persona-backend-venv
      UV_LINK_MODE: copy
      DATABASE_URL: postgresql+psycopg://persona:persona@db:5432/persona_mirror
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  ai-worker:
    image: python:3.11.15-slim
    working_dir: /workspace
    command: sh -c "pip install uv && cd apps/ai-worker && uv run python -u -m worker.main"
    env_file:
      - apps/ai-worker/.env
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/persona-ai-worker-venv
      UV_LINK_MODE: copy
      DATABASE_URL: postgresql+psycopg://persona:persona@db:5432/persona_mirror
    volumes:
      - ./:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16.13-alpine
    env_file:
      - compose.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4.7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  frontend_node_modules:
